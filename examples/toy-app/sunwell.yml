app: toy-app
maven:
  module: examples/toy-app
jar: examples/toy-app/target/toy-app-benchmarks.jar
default-target: local-docker
default-focus: baseline

targets:
  local-docker:
    transport: ssh
    host: localhost
    port: 2222
    user: sunwell
    key: examples/docker/sunwell_dev_key
    remote-path: /home/sunwell

# Optional — narrow analysis to the code you care about.
# Both fields are independent; omit either or both.
# analyze:
#   hints:
#     thread: jmh-worker        # keep only events from threads whose name contains this
#     package: dev.sunwell.toy  # find first stack frame in this package instead of top-of-stack

# Optional — tune loop termination. Defaults apply if this block is absent.
# loop:
#   improvement-threshold-pct: 10   # stop (SUCCESS) when any benchmark improves by this much
#   stall-iterations: 3             # stop (STALL) after N consecutive no-improvement iterations
